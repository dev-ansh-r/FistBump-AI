name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rocky/ui/src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rocky/ui/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Python backend + PyInstaller
        run: pip install -e ".[sidecar]"

      - name: Build sidecar binary
        run: python scripts/build_sidecar.py

      - name: Install UI deps
        working-directory: rocky/ui
        run: npm ci

      - name: Build Tauri app
        working-directory: rocky/ui
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocky-${{ matrix.target }}
          path: |
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            rocky/ui/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
